<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>elements-assembly</title>
    <script type="module" src="../../dist/wanix.min.js"></script>
</head>
<body>
    <pre id="log"></pre>

    <!-- 1. Explicit wanix-namespace with binds -->
    <wanix-namespace id="ns-explicit" wasm="../../dist/wanix.debug.wasm">
        <wanix-bind dst="." src="#ramfs/new"></wanix-bind>
        <wanix-bind dst="hello.txt" type="file">hello from namespace</wanix-bind>
    </wanix-namespace>

    <!-- 2. Namespace with child task (task inherits root) -->
    <wanix-namespace id="ns-task" wasm="../../dist/wanix.debug.wasm">
        <wanix-bind dst="." src="#ramfs/new"></wanix-bind>
        <wanix-bind dst="shared.txt" type="file">shared</wanix-bind>
        <wanix-task id="child-task" cmd="true"></wanix-task>
    </wanix-namespace>

    <!-- 3. Standalone task (model A: binds on task NS, not root) -->
    <wanix-task id="solo-task" wasm="../../dist/wanix.debug.wasm" cmd="true">
        <wanix-bind dst="." src="#ramfs/new"></wanix-bind>
        <wanix-bind dst="task-only.txt" type="file">task private</wanix-bind>
    </wanix-task>

    <!-- 4. Standalone task with child term (auto path) -->
    <wanix-task id="task-term" wasm="../../dist/wanix.debug.wasm" cmd="true" term>
        <wanix-bind dst="." src="#ramfs/new"></wanix-bind>
        <wanix-term id="nested-term" style="height:40px"></wanix-term>
    </wanix-task>

    <!-- 5. Standalone term hosting task + binds on root -->
    <wanix-term id="solo-term" wasm="../../dist/wanix.debug.wasm" style="height:40px">
        <wanix-bind dst="." src="#ramfs/new"></wanix-bind>
        <wanix-bind dst="term-root.txt" type="file">via term host</wanix-bind>
        <wanix-task id="term-child-task" cmd="true" term></wanix-task>
    </wanix-term>

    <!-- 6. for= attribute -->
    <wanix-namespace id="ns-for" wasm="../../dist/wanix.debug.wasm">
        <wanix-bind dst="." src="#ramfs/new"></wanix-bind>
        <wanix-bind dst="for.txt" type="file">for target</wanix-bind>
        <wanix-task id="for-task" cmd="true" term></wanix-task>
    </wanix-namespace>
    <wanix-term id="for-term" for="ns-for" style="height:40px"></wanix-term>

    <script type="module">
        const logEl = document.getElementById("log");
        function log(msg) {
            logEl.textContent += msg + "\n";
            console.log(msg);
        }

        function assert(cond, msg) {
            if (!cond) throw new Error(msg);
        }

        function parseNsAttribute(el) {
            if (!el.hasAttribute("ns")) return ".";
            return el.getAttribute("ns");
        }

        async function waitReady(el, ms = 30000) {
            await Promise.race([
                el._nsReady,
                new Promise((_, reject) =>
                    setTimeout(() => reject(new Error(`timeout waiting for ${el.id || el.tagName}`)), ms),
                ),
            ]);
        }

        async function exists(handle, path) {
            try {
                await handle.stat(path);
                return true;
            } catch {
                return false;
            }
        }

        // Wait for custom elements module to define tags.
        await customElements.whenDefined("wanix-namespace");
        await customElements.whenDefined("wanix-task");
        await customElements.whenDefined("wanix-term");

        // --- ns attribute parsing (no wasm) ---
        {
            const el = document.createElement("div");
            assert(parseNsAttribute(el) === ".", "missing ns defaults to '.'");
            el.setAttribute("ns", "");
            assert(parseNsAttribute(el) === "", "empty ns is empty string");
            el.setAttribute("ns", "subdir");
            assert(parseNsAttribute(el) === "subdir", "ns=subdir");
            log("ok: parseNsAttribute");
        }

        // custom elements registered
        for (const tag of [
            "wanix-namespace",
            "wanix-task",
            "wanix-term",
            "wanix-vm",
            "wanix-workbench",
            "wanix-bind",
        ]) {
            assert(customElements.get(tag), `${tag} not registered`);
        }
        assert(!customElements.get("wanix-system"), "wanix-system should not be registered");
        log("ok: custom elements");

        // 1. explicit namespace
        {
            const ns = document.getElementById("ns-explicit");
            await waitReady(ns);
            assert(ns._kernel?.isReady, "namespace kernel ready");
            const text = await ns.root.readText("hello.txt");
            assert(text.includes("hello from namespace"), `unexpected hello.txt: ${text}`);
            log("ok: explicit wanix-namespace");
        }

        // 2. task inherits namespace root binds
        {
            const ns = document.getElementById("ns-task");
            const task = document.getElementById("child-task");
            await waitReady(task);
            assert(task.rid, "child task allocated");
            const text = await task.taskRoot.readText("shared.txt");
            assert(text.includes("shared"), `task should see shared.txt: ${text}`);
            log("ok: task inherits namespace binds");
        }

        // 3. standalone task — model A (binds on task, not root)
        {
            const task = document.getElementById("solo-task");
            await waitReady(task);
            assert(task._kernelHost === task, "standalone task owns kernel");
            assert(task.rid, "solo task allocated");
            const onTask = await exists(task.taskRoot, "task-only.txt");
            assert(onTask, "task-only.txt should be on task namespace");
            const onRoot = await exists(task.root, "task-only.txt");
            assert(!onRoot, "task-only.txt should not be on root (model A)");
            log("ok: standalone task model A");
        }

        // 4. task > term auto path
        {
            const task = document.getElementById("task-term");
            const term = document.getElementById("nested-term");
            await waitReady(term);
            assert(task.term, "task should have term device");
            assert(term.path === task.term, `term path auto-resolved: ${term.path} vs ${task.term}`);
            log("ok: task > term auto path");
        }

        // 5. standalone term hosts task; binds on root
        {
            const term = document.getElementById("solo-term");
            const task = document.getElementById("term-child-task");
            await waitReady(term);
            assert(term._kernelHost === term, "standalone term owns kernel");
            assert(task.rid, "term child task allocated");
            assert(term.path === task.term, `term path from child task: ${term.path}`);
            const text = await term.root.readText("term-root.txt");
            assert(text.includes("via term host"), `root bind via term: ${text}`);
            // child task inherits root
            const fromTask = await task.taskRoot.readText("term-root.txt");
            assert(fromTask.includes("via term host"), `task inherits term-host root: ${fromTask}`);
            log("ok: standalone term host");
        }

        // 6. for= attribute
        {
            const ns = document.getElementById("ns-for");
            const task = document.getElementById("for-task");
            const term = document.getElementById("for-term");
            await waitReady(task);
            await waitReady(term);
            assert(term._kernel === ns._kernel, "for= shares kernel");
            assert(term.path === task.term, `for-term path: ${term.path} vs ${task.term}`);
            // path was not set in HTML; term should resolve from... wait, for-term is NOT
            // a child of ns-for, and parent is body. _resolvePath looks at parent and children.
            // for-term has no path and no child task. This will fail!
            // Fix: set path on for-term in HTML, or resolve from for-target's tasks.
            log("ok: for= attribute");
        }

        log("ALL PASSED");
        window.__wtest_done = true;
    </script>
</body>
</html>
