<html>
<head>
    <title>task-js</title>
    <script type="module" src="../dist/wanix.min.js"></script>
</head>
<body>
    <p>Output in DevTools console. Be sure to read the comments in the source.</p>
    
    <!-- a wanix system is an empty root task/namespace -->
    <wanix-namespace debug>
        <wanix-bind dst="." src="#ramfs/new"></wanix-bind>

        <!-- write a script that waits for the worker start message logs it -->
        <wanix-bind dst="myscript.js" type="file" perm="0766">
            const worker = await new Promise(r => {
                globalThis.onmessage = (e) => {if (e.data.worker) r(e.data.worker)};
            });
            console.log("Task started:", worker);
        </wanix-bind>

        <!-- run the script -->
        <wanix-task cmd="myscript.js" start></wanix-task>
        
    </wanix-namespace>

</body>
</html>
