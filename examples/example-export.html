<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>example-export</title>
    <script type="module" src="../dist/wanix.min.js"></script>
</head>
<body>
    <wanix-system id="main" wasm="../dist/wanix.debug.wasm" allow-origins="*" debug>

        <!-- bind a ramfs to the root of the namespace -->
        <wanix-bind dst="." src="#ramfs"></wanix-bind>
        
        <!-- now we can write files -->
        <wanix-bind dst="myfile.txt" type="file" mode="0644">
            Hello, world!
            This is line two.
        </wanix-bind>

        <!-- export a whole linux filesystem -->
        <wanix-bind type="archive" dst="alpine" src="../extras/dist/wanix-linux.tgz"></wanix-bind>

        <!-- we can make hidden system names visible in the namespace -->
        <wanix-bind dst="web" src="#web"></wanix-bind>
        

    </wanix-system>

</body>
</html>
