<html>
<head>
    <title>basic-workbench</title>
    <script src="../dist/wanix.min.js" type="module"></script>
</head>
<body style="height: 100vh;">

    <!-- a wanix system is an empty root task/namespace -->
    <wanix-system wasm="../dist/wanix.debug.wasm" debug>

        <!-- bind an archive to the name root in the namespace -->
        <wanix-bind type="archive" dst="root" src="../extras/dist/wanix-linux.tgz"></wanix-bind>

        <!-- fetch the rc.wasm file -->
        <wanix-bind type="fetch" dst="rc.wasm" src="./repl-rc/rc.wasm"></wanix-bind>

        <!-- set up workbench with terminal starting in the root directory with rc.wasm as the shell -->
        <wanix-workbench wd="root" assets="/workbench" term>
            
            <!-- this becomes a "template" for starting a shell task in workbench -->
            <wanix-task role="shell" cmd="rc.wasm"></wanix-task>

        </wanix-workbench>

    </wanix-system>

</body>
</html>
