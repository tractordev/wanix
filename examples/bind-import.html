<html>
<head>
    <title>bind-import</title>
    <script type="module" src="../dist/wanix.min.js"></script>
</head>
<body style="height: 100vh; margin: 0;">

    <!-- a wanix system is an empty root task/namespace -->
    <wanix-namespace debug>

        <!-- import a remote system into our namespace -->
        <wanix-bind type="import" dst="remote" 
            src="http://localhost:7070/examples/example-export.html#main"></wanix-bind>

        <!-- set up a wanix rc repl task to explore the remote namespace -->
        <wanix-bind type="file" dst="rc.wasm" src="./repl-rc/rc.wasm"></wanix-bind>
        <wanix-task cmd="rc.wasm" term start></wanix-task>
        <wanix-term></wanix-term>
    
    </wanix-namespace>

</body>
</html>
