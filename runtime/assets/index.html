<html>
<head>
    <meta charset="utf-8"/>
    <style>
        body {
            margin: 0;
            height: 100%;
        }
        wanix-workbench, wanix-terminal {
            height: 100%;
        }
        .xterm-viewport {
            background-color: rgb(45, 45, 45) !important;
        }
    </style>
</head>
<body>
<script type="module">
    import "./wanix.min.js";

    const queryParams = new URLSearchParams(window.location.search);
    
    const system = document.createElement("wanix-system");
    system.id = "wanix-main";
    system.setAttribute("helpers", "");
    system.setAttribute("wasm", queryParams.get('wasm') || "./wanix.wasm");
    system.setAttribute("bundle", queryParams.get('bundle') || "/shell/bundle.tgz");
    system.setAttribute("network", queryParams.get('network') || "ws://localhost:7654/.well-known/ethernet");
    if (queryParams.get('export9p') === 'true') system.setAttribute("export9p", "");
    if (queryParams.get('screen') === 'true') system.setAttribute("screen", "");
    if (queryParams.get('debug9p') === 'true') system.setAttribute("debug9p", "");
    document.body.appendChild(system);

    const w = await system.ready();
    console.log("wanix ready");

    const url = queryParams.get("tty");
    if (url) {
        // websocket tty mode 
        const wid = (await system.readText("cap/new/ws")).trim();
        await system.writeFile("cap/1/ctl", `mount ${url}`);            
        await system.writeFile("task/1/ctl", `bind #console/data cap/${wid}/data`);
    } else {
        // xterm.js mode 
        console.log("xterm.js mode");
        const term = document.createElement("wanix-terminal");
        term.setAttribute("for", "wanix-main");
        term.setAttribute("src", "#console/data");
        document.body.appendChild(term);
        // const bench = document.createElement("wanix-workbench");
        // bench.setAttribute("for", "wanix-main");
        // bench.setAttribute("base", "/local/vscode");
        // document.body.appendChild(bench);
        // bench.load(async () => {
        //     console.log("vscode waiting for apptron...");
        //     await system.ready();
        //     console.log("vscode ready!");
        //     return system.createPort();
        // });
    }
    
    try {
        console.log("reading init.js");
        const initJS = await system.readText("#bundle/init.js");
        const blob = new Blob([initJS], { type: 'text/javascript' });
        const initUrl = URL.createObjectURL(blob);
        const initModule = await import(initUrl);
        await initModule.default(w);
        console.log("loaded init.js");
    } catch (e) {
        console.log("No bundle init.js found");
    }
</script>
</body>
</html>
